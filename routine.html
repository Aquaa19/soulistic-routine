<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulistic IND Academic Routine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@700;800;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: #e8f3eb; padding: 24px; color: #0d3320; }
        
        .page-tools { max-width: 850px; margin: 0 auto 16px; display: flex; justify-content: flex-end; }
        .pdf-btn { border: none; border-radius: 999px; padding: 12px 24px; background: linear-gradient(135deg, #051a10, #0d3320); color: #f5d060; font-size: 14px; font-weight: 900; letter-spacing: 1px; cursor: pointer; box-shadow: 0 8px 20px rgba(13,51,32,0.18); transition: transform 0.2s ease; }
        .pdf-btn:hover { transform: translateY(-2px); }

        .wrap { max-width: 850px; margin: 0 auto; background: #fff; display: flex; flex-direction: column; border: 3px solid #051a10; box-shadow: 0 8px 40px rgba(0,0,0,0.18); border-radius: 12px; overflow: hidden; }
        
        /* HEADER - Restored Original Style */
        .hdr { background: linear-gradient(135deg, #1eb26c 0%, #3e7a5b 55%, #0b9754 100%); padding: 24px 32px; display: flex; align-items: center; gap: 22px; position: relative; overflow: hidden; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .hdr::before { content: ''; position: absolute; right: -40px; top: -40px; width: 200px; height: 200px; border-radius: 50%; background: rgba(255, 215, 80, 0.05); }

        .logo-hex { width: 96px; height: 110.85px; min-width: 96px; background: #d4af37; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); z-index: 2; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .logo-img { width: calc(100% - 6px); height: calc(100% - 6px); object-fit: cover; background: white; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: block; }
        
        .hdr-text { flex: 1; z-index: 1; }
        .inst-name { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 900; color: #f5d060; letter-spacing: 1px; line-height: 1.1; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        .inst-sub { font-size: 14px; font-weight: 900; color: #feff31; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
        
        .badge-row { display: flex; gap: 10px; margin-top: 12px; }
        .badge { background: rgba(0, 0, 0, 0.25); border: 2px solid #d4af37; border-radius: 20px; padding: 5px 18px; font-size: 13px; font-weight: 900; color: #f5d060; letter-spacing: 0.5px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        /* TABLE - Restored High Contrast Style */
        .tbl-wrap { padding: 20px; background: #f4fbf6; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid #051a10; }
        col.c-day { width: 100px; }
        
        thead tr th { background: #f5d060; color: #000; font-size: 14px; font-weight: 900; letter-spacing: 1.2px; text-transform: uppercase; padding: 14px 6px; text-align: center; border: 2px solid #051a10; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        tbody tr td { border: 2px solid #051a10; text-align: center; vertical-align: middle; padding: 8px 4px; }
        tbody tr td:first-child { background: #FFF4D5; color: #000; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        .day-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 0; }
        .day-abbr { font-size: 22px; font-weight: 900; line-height: 1; text-transform: uppercase; }
        .day-full { font-size: 10px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }

        .subj { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 6px auto; border-radius: 8px; padding: 8px 4px; width: 95%; border-width: 3px; border-style: solid; min-height: 55px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        /* SYRINGE SHAPE FOR BOOSTER DOSE */
        .subj-syringe { position: relative; margin-top: 15px !important; margin-bottom: 20px !important; background: repeating-linear-gradient(90deg, rgba(0,0,0,0.06), rgba(0,0,0,0.06) 1px, transparent 1px, transparent 10px), #fee2e2 !important; border-radius: 4px 4px 12px 12px !important; border-top-width: 4px !important; }
        .subj-syringe::before { content: ''; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 18px; height: 15px; background: #dc2626; clip-path: polygon(0 0, 100% 0, 100% 25%, 65% 25%, 65% 100%, 35% 100%, 35% 25%, 0 25%); -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .subj-syringe::after { content: ''; position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); width: 3px; height: 18px; background: #64748b; clip-path: polygon(50% 100%, 0 0, 100% 0); -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        .subj-name { font-size: 14px; font-weight: 900; line-height: 1.2; word-wrap: break-word; }
        .initials { font-size: 13px; font-weight: 900; color: #000; margin-left: 3px; }
        .subj-time { font-size: 13px; font-weight: 900; margin-top: 2px; }

        .off-cell { display: flex; align-items: center; justify-content: center; height: 55px; background: #e2e8f0; border-radius: 8px; margin: 2px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .off-txt { font-size: 13px; font-weight: 900; letter-spacing: 2.5px; color: #051a10; text-transform: uppercase; }

        .footer { background: #106d41; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; color: #ffee00; border-top: 2px solid #d4af37; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .ft-txt { font-size: 12px; font-weight: 900; letter-spacing: 1.5px; }

        @media print { .page-tools { display: none; } .wrap { width: 100%; border-radius: 0; border-width: 2px; } .hdr { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
    </style>
</head>
<body>
    <div class="page-tools"><button class="pdf-btn" onclick="window.print()">Print Routine</button></div>
    <div class="wrap">
        <div class="hdr">
            <div class="logo-hex"><img class="logo-img" src="soul-logo.jpg"></div>
            <div class="hdr-text">
                <div class="inst-name">Soulistic IND</div>
                <div class="inst-sub">Centre of Academic Excellence</div>
                <div class="badge-row">
                    <div class="badge" id="classNameBadge">Class ---</div>
                    <div class="badge" id="sessionBadge">Session 2026–27</div>
                </div>
            </div>
            <!-- Decorative SVG -->
            <svg width="60" height="60" viewBox="0 0 70 70" style="opacity:0.25;position:absolute;right:32px;top:20px;">
                <circle cx="35" cy="35" r="30" stroke="#f5d060" stroke-width="3" fill="none"/>
                <circle cx="35" cy="35" r="15" stroke="#f5d060" stroke-width="1.5" fill="none"/>
                <line x1="35" y1="5" x2="35" y2="65" stroke="#f5d060" stroke-width="1.5"/>
                <line x1="5" y1="35" x2="65" y2="35" stroke="#f5d060" stroke-width="1.5"/>
            </svg>
        </div>
        <div class="tbl-wrap">
            <table>
                <colgroup><col class="c-day"><col><col><col><col></colgroup>
                <thead>
                    <tr><th>Day</th><th>Slot 1 · 3:00 PM</th><th>Slot 2 · 4:00 PM</th><th>Slot 3 · 5:00 PM</th><th>Slot 4 · 6:00 PM</th></tr>
                </thead>
                <tbody id="routineBody"></tbody>
            </table>
        </div>
        <div class="footer"><div class="ft-txt" id="footerClass">SOULISTIC IND • CLASS ---</div><div class="ft-txt">★ STUDY HARD · DREAM BIG · ACHIEVE MORE ★</div></div>
    </div>

    <script>
        const subjectStyles = {
            "Biology": { bg: "#d1fae5", border: "#059669", color: "#065f46" },
            "History": { bg: "#fef3c7", border: "#d97706", color: "#78350f" },
            "Mathematics": { bg: "#dbeafe", border: "#2563eb", color: "#1e3a8a" },
            "Bengali": { bg: "#ede9fe", border: "#7c3aed", color: "#3b0764" },
            "Chemistry": { bg: "#cffafe", border: "#0891b2", color: "#164e63" },
            "Computer": { bg: "#e0e7ff", border: "#4f46e5", color: "#1e1b4b" },
            "Geography": { bg: "#ffedd5", border: "#ea580c", color: "#431407" },
            "English": { bg: "#f0fdfa", border: "#0d9488", color: "#134e4a" },
            "Physics": { bg: "#fef9c3", border: "#ca8a04", color: "#422006" },
            "Hindi": { bg: "#ffe4e6", border: "#be123c", color: "#4c0519" },
            "Booster Dose": { bg: "#fee2e2", border: "#dc2626", color: "#7f1d1d", isSpecial: true }
        };

        const slots = ["3:00 PM", "4:00 PM", "5:00 PM", "6:00 PM"];
        const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data.type === 'UPDATE_ROUTINE') {
                document.getElementById('classNameBadge').innerText = "Class " + data.className;
                document.getElementById('footerClass').innerText = "SOULISTIC IND • CLASS " + data.className;
                if(data.session) document.getElementById('sessionBadge').innerText = data.session;
                renderTable(data.schedule);
            }
        });

        function renderTable(schedule) {
            const tbody = document.getElementById('routineBody');
            tbody.innerHTML = '';
            
            days.forEach((day, index) => {
                const tr = document.createElement('tr');
                tr.className = index % 2 === 0 ? 'row-norm' : 'row-alt';
                
                const dayCell = document.createElement('td');
                dayCell.innerHTML = `<div class="day-cell"><span class="day-abbr">${day.substring(0,3)}</span><span class="day-full">${day}</span></div>`;
                tr.appendChild(dayCell);

                const dayData = schedule[day];
                if (!dayData || Object.keys(dayData).length === 0) {
                    const offCell = document.createElement('td');
                    offCell.colSpan = 4;
                    offCell.innerHTML = `<div class="off-cell"><span class="off-txt">— No Classes Scheduled —</span></div>`;
                    tr.appendChild(offCell);
                } else {
                    slots.forEach(slot => {
                        const td = document.createElement('td');
                        const item = dayData[slot];
                        if (item) {
                            const style = subjectStyles[item.subject] || { bg: "#f1f5f9", border: "#94a3b8", color: "#1e293b" };
                            const syringeClass = style.isSpecial ? "subj-syringe" : "";
                            td.innerHTML = `
                                <div class="subj ${syringeClass}" style="background:${style.bg}; border-color:${style.border}; color:${style.color}">
                                    <div class="subj-name">${item.subject} <span class="initials">(${item.teacher})</span></div>
                                    <div class="subj-time">${slot}</div>
                                </div>`;
                        }
                        tr.appendChild(td);
                    });
                }
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
